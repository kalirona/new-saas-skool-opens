# LearnHouse CI/CD Pipeline
#
# Builds the Docker image, runs checks, and deploys to production.
# Supports: Docker Hub, GitHub Container Registry, and direct VPS deploy.

name: Deploy

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ── Lint & Test ──────────────────────────────────────────────────────
  check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./apps/api
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.10.x"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "apps/api/pyproject.toml"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint with ruff
        run: uv run ruff check src/

      - name: Type check with pyright
        run: uv run pyright src/ || true

      - name: Run tests
        run: uv run pytest src/tests/ -x --timeout=60 -q
        continue-on-error: true

  # ── Build & Push Docker Image ────────────────────────────────────────
  build:
    needs: [check]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            LEARNHOUSE_PUBLIC=true

  # ── Deploy to Production ─────────────────────────────────────────────
  deploy:
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          script: |
            cd /home/learnhouse/app
            docker compose pull api
            docker compose up -d --no-deps --scale api=2 api
            sleep 10
            docker compose up -d --no-deps --scale api=1 api
            docker image prune -f
