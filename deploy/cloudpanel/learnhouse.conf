# LearnHouse CloudPanel Nginx Config
# Place in: /etc/nginx/sites-available/learnhouse.conf
# Enable: ln -s /etc/nginx/sites-available/learnhouse.conf /etc/nginx/sites-enabled/
# Then: systemctl reload nginx

upstream api_backend {
    least_conn;
    server 127.0.0.1:9000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 80;
    server_name learnhouse.example.com;
    client_max_body_size 6G;

    # ── Health checks ──────────────────────────────────────────────────
    location /api/v1/health/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    location /live {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    location /ready {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log off;
    }

    # ── API ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Content files (cached) ─────────────────────────────────────────
    location /content/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering on;
        proxy_cache_valid 200 24h;
        expires 24h;
        add_header Cache-Control "public, immutable";
    }

    # ── Deny hidden files ──────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;

    # ── SSL (CloudPanel manages via Certbot) ──────────────────────────
    # CloudPanel handles SSL automatically. Uncomment to force HTTPS:
    # if ($scheme != "https") {
    #     return 301 https://$host$request_uri;
    # }
}
