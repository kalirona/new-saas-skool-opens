# LearnHouse Production Nginx Config
# Zero-downtime via upstream keepalive + health checks
#
# Usage in Docker Compose:
#   - This file is mounted at /etc/nginx/nginx.conf in the nginx container
#   - SSL is terminated at the nginx container level
#   - LEARNHOUSE_SSL=true tells the API to set HSTS and secure cookie flags
#
# Standalone VPS:
#   Use deploy/nginx-ssl.conf instead — that file includes HTTP→HTTPS redirect
#   and is configured for Let's Encrypt.

upstream api_backend {
    least_conn;
    server api:9000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

server {
    listen 80;
    server_name _;
    client_max_body_size 6G;

    # ── Log format with request timing ──────────────────────────────────
    log_format json_analytics escape=json
        '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_id":"$http_x_request_id",'
        '"method":"$request_method",'
        '"path":"$uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent"'
        '}';

    # ── Security headers ────────────────────────────────────────────────
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Health check passthrough ────────────────────────────────────────
    location /api/v1/health/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log /var/log/nginx/health.log json_analytics;
    }

    location /live {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log /var/log/nginx/health.log json_analytics;
    }

    location /ready {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log /var/log/nginx/health.log json_analytics;
    }

    # ── Monitoring metrics passthrough ─────────────────────────────────
    location /api/v1/monitoring/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        access_log /var/log/nginx/monitoring.log json_analytics;
    }

    # ── API ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Content files (cached for 24h) ────────────────────────────────
    location /content/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering on;
        proxy_cache_valid 200 24h;
        expires 24h;
        add_header Cache-Control "public, immutable";
    }

    # ── Static assets ──────────────────────────────────────────────────
    location / {
        return 404;
        # If frontend is served separately, add its proxy config here
    }

    # ── Deny access to hidden files ────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Gzip ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
}
