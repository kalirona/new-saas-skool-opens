# LearnHouse Production Nginx Config (SSL Enabled)
# Place in /etc/nginx/sites-available/learnhouse.conf
# Then: ln -s /etc/nginx/sites-available/learnhouse.conf /etc/nginx/sites-enabled/
# Then: systemctl reload nginx
#
# Prerequisites:
#   1. Point DNS A record to this server
#   2. Obtain SSL cert: certbot --nginx -d learnhouse.example.com
#   3. Update ssl_certificate paths below

upstream api_backend {
    least_conn;
    server 127.0.0.1:9000 max_fails=3 fail_timeout=10s;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ───────────────────────────────────────────────
server {
    listen 80;
    server_name learnhouse.example.com;
    client_max_body_size 6G;

    # Redirect everything to HTTPS except ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name learnhouse.example.com;
    client_max_body_size 6G;

    # ── SSL configuration ──────────────────────────────────────────────
    ssl_certificate /etc/letsencrypt/live/learnhouse.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/learnhouse.example.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # ── Logging ────────────────────────────────────────────────────────
    log_format json_analytics escape=json
        '{'
        '"timestamp":"$time_iso8601",'
        '"remote_addr":"$remote_addr",'
        '"request_id":"$http_x_request_id",'
        '"method":"$request_method",'
        '"path":"$uri",'
        '"status":$status,'
        '"body_bytes":$body_bytes_sent,'
        '"request_time":$request_time,'
        '"upstream_time":"$upstream_response_time",'
        '"referer":"$http_referer",'
        '"user_agent":"$http_user_agent"'
        '}';

    access_log /var/log/nginx/learnhouse-access.log json_analytics;
    error_log /var/log/nginx/learnhouse-error.log;

    # ── Security headers ───────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.umami.is; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self'; connect-src 'self' https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;

    # ── Health check passthrough (no caching) ──────────────────────────
    location /api/v1/health/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location /live {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    location /ready {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-Proto $scheme;
        access_log off;
    }

    # ── Monitoring / metrics ──────────────────────────────────────────
    location /api/v1/monitoring/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── API proxy ──────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID $request_id;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
    }

    # ── Content files (long-lived cache) ──────────────────────────────
    location /content/ {
        proxy_pass http://api_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering on;
        proxy_cache_valid 200 24h;
        expires 24h;
        add_header Cache-Control "public, immutable";
    }

    # ── Deny hidden files ──────────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── Gzip ───────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
