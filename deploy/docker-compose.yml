# LearnHouse Production Docker Compose
# Zero-downtime deployment with rolling updates.
# Usage: docker compose --env-file .env -f deploy/docker-compose.yml up -d

version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

x-health-check: &health-check
  interval: 15s
  timeout: 5s
  retries: 3
  start_period: 30s

services:
  # ── Database ──────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-learnhouse}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-learnhouse}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-learnhouse} -d ${POSTGRES_DB:-learnhouse}"]
      <<: *health-check
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis ─────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --save 60 1
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      <<: *health-check
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 256M

  # ── API (horizontally scalable) ───────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
      args:
        LEARNHOUSE_PUBLIC: "true"
    image: learnhouse/api:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      LEARNHOUSE_SQL_CONNECTION_STRING: ${LEARNHOUSE_SQL_CONNECTION_STRING}
      LEARNHOUSE_REDIS_CONNECTION_STRING: ${LEARNHOUSE_REDIS_CONNECTION_STRING}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/api/v1/health/live"]
      <<: *health-check
    logging: *default-logging
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
        order: start-first
      resources:
        limits:
          memory: 512M

  # ── Nginx reverse proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
      - certs:/etc/letsencrypt
      - certs-data:/data/letsencrypt
    depends_on:
      - api
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      <<: *health-check
    logging: *default-logging
    deploy:
      resources:
        limits:
          memory: 64M

volumes:
  pgdata:
  redisdata:
  certs:
  certs-data:
